<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휴가계 신청서</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #14202B;
    --text: #F1E9D8;
    --text-muted: #9FB0B8;
    --accent: #B0925A;
    --accent-hover: #C6A56C;
    --accent-text: #14202B;
    --card-bg: #1B2E3B;
    --field-bg: #14202B;
    --border: #2E4453;
    --toggle-bg: #1B2E3B;
    --toggle-border: #2E4453;
    --success: #6FBF73;
    --error: #D9534F;
  }

  html[data-theme="light"] {
    --bg: #F7F3EA;
    --text: #14202B;
    --text-muted: #5E6C74;
    --accent: #B0925A;
    --accent-hover: #9C7F49;
    --accent-text: #FFFFFF;
    --card-bg: #FFFFFF;
    --field-bg: #FBF9F4;
    --border: #DDD3C0;
    --toggle-bg: #FFFFFF;
    --toggle-border: #DDD3C0;
  }

  body {
    font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
    transition: background 0.2s ease, color 0.2s ease;
  }

  #theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--toggle-bg);
    border: 1px solid var(--toggle-border);
    color: var(--text);
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  p.desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 36px;
    text-align: center;
  }

  form {
    width: 100%;
    max-width: 560px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .row {
    display: flex;
    gap: 16px;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  label .req { color: var(--error); margin-left: 2px; }

  input, select, textarea {
    background: var(--field-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 0.95rem;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  .date-period-group {
    display: flex;
    gap: 6px;
  }

  .date-period-group input[type="date"] { flex: 2; min-width: 118px; }
  .date-period-group select { flex: 1; min-width: 62px; }

  input[readonly] {
    color: var(--accent);
    font-weight: 600;
    cursor: default;
  }

  .table-wrapper {
    overflow-x: auto;
  }

  table.leave-table {
    width: 100%;
    min-width: 620px;
    border-collapse: collapse;
  }

  .leave-table th, .leave-table td {
    padding: 6px;
    text-align: left;
    vertical-align: top;
  }

  .leave-table th {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .leave-table td:nth-child(1) { width: 110px; }
  .leave-table td:nth-child(4) { width: 90px; }
  .leave-table td:nth-child(6) { width: 34px; }

  .leave-table input, .leave-table select {
    padding: 8px 10px;
    font-size: 0.85rem;
  }

  .remove-row-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--error);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
  }

  #add-row-btn {
    align-self: flex-start;
    background: none;
    border: 1px dashed var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
  }

  #add-row-btn:hover {
    background: rgba(176, 146, 90, 0.1);
  }

  .total-days-row {
    display: flex;
    justify-content: flex-end;
    align-items: baseline;
    gap: 10px;
    font-size: 0.9rem;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .total-days-row .value {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.05rem;
  }

  .section-title {
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  #submit-btn {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    padding: 15px 20px;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, opacity 0.15s ease;
    margin-top: 8px;
  }

  #submit-btn:hover { background: var(--accent-hover); }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  #status-msg {
    max-width: 560px;
    width: 100%;
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }

  #status-msg.show { display: block; }
  #status-msg.success { background: rgba(111, 191, 115, 0.12); border: 1px solid var(--success); color: var(--success); }
  #status-msg.error { background: rgba(217, 83, 79, 0.12); border: 1px solid var(--error); color: var(--error); }

  @media (max-width: 480px) {
    .row { flex-direction: column; }
    form { padding: 24px 20px; }
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="테마 전환" title="다크/화이트 모드 전환">🌙</button>

<h1>휴가계 신청서</h1>
<p class="desc">아래 항목을 작성 후 제출하면 담당 부서로 자동 전송됩니다.</p>

<form id="vacation-form" action="https://formspree.io/f/mbdngzkz" method="POST">
  <div class="section-title">신청자 정보</div>

  <div class="row">
    <div class="field">
      <label for="name">성명<span class="req">*</span></label>
      <input type="text" id="name" name="성명" required autocomplete="name">
    </div>
    <div class="field">
      <label for="dept">소속(부서)<span class="req">*</span></label>
      <input type="text" id="dept" name="소속부서" required>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="position">직급/직책</label>
      <input type="text" id="position" name="직급직책">
    </div>
    <div class="field">
      <label for="empno">사번</label>
      <input type="text" id="empno" name="사번">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="email">이메일(회신용)<span class="req">*</span></label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>
    <div class="field">
      <label for="phone">비상연락처</label>
      <input type="tel" id="phone" name="비상연락처" placeholder="010-0000-0000">
    </div>
  </div>

  <div class="section-title">휴가 정보</div>
  <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: -12px;">여러 종류의 휴가를 한 번에 신청할 수 있습니다. 항목을 추가해 입력하세요.</p>

  <div class="table-wrapper">
    <table class="leave-table">
      <thead>
        <tr>
          <th>휴가종류</th>
          <th>시작일</th>
          <th>종료일</th>
          <th>휴가일수</th>
          <th>비고</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leave-rows"></tbody>
    </table>
  </div>

  <button type="button" id="add-row-btn">+ 휴가 항목 추가</button>

  <div class="total-days-row">
    <span>총 휴가일수</span>
    <span class="value" id="total-days">0일</span>
  </div>

  <div class="field">
    <label for="applydate">신청일</label>
    <input type="date" id="applydate" name="신청일">
  </div>

  <input type="hidden" name="_subject" value="휴가계 신청서 제출">

  <button type="submit" id="submit-btn">신청서 제출</button>
</form>

<div id="status-msg"></div>

<script>
  const themeToggleBtn = document.getElementById('theme-toggle');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggleBtn.textContent = theme === 'light' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
  }

  const savedTheme = localStorage.getItem('theme')
    || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);

  themeToggleBtn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // 신청일 기본값 = 오늘
  document.getElementById('applydate').valueAsDate = new Date();

  // 휴가 항목 테이블 (휴가종류 / 시작일 / 종료일 / 휴가일수 / 비고)
  const leaveRowsBody = document.getElementById('leave-rows');
  const addRowBtn = document.getElementById('add-row-btn');
  const totalDaysEl = document.getElementById('total-days');
  let rowCounter = 0;

  function createLeaveRow() {
    rowCounter++;
    const idx = rowCounter;
    const tr = document.createElement('tr');
    tr.className = 'leave-row';
    tr.innerHTML = `
      <td>
        <select name="휴가종류_${idx}" required>
          <option value="">선택</option>
          <option value="연차">연차</option>
          <option value="병가">병가</option>
          <option value="경조사">경조사</option>
          <option value="공가">공가</option>
          <option value="기타">기타</option>
        </select>
      </td>
      <td>
        <div class="date-period-group">
          <input type="date" name="시작일_${idx}" class="row-start" required>
          <select name="시작구분_${idx}" class="row-start-period">
            <option value="오전">오전</option>
            <option value="오후">오후</option>
          </select>
        </div>
      </td>
      <td>
        <div class="date-period-group">
          <input type="date" name="종료일_${idx}" class="row-end" required>
          <select name="종료구분_${idx}" class="row-end-period">
            <option value="오전">오전</option>
            <option value="오후" selected>오후</option>
          </select>
        </div>
      </td>
      <td>
        <input type="text" name="휴가일수_${idx}" class="row-days" readonly placeholder="자동계산">
      </td>
      <td>
        <input type="text" name="비고_${idx}" placeholder="비고">
      </td>
      <td>
        <button type="button" class="remove-row-btn" title="행 삭제">✕</button>
      </td>
    `;
    return tr;
  }

  function calcRowDays(tr) {
    const startInput = tr.querySelector('.row-start');
    const endInput = tr.querySelector('.row-end');
    const startPeriodInput = tr.querySelector('.row-start-period');
    const endPeriodInput = tr.querySelector('.row-end-period');
    const daysInput = tr.querySelector('.row-days');

    const startVal = startInput.value;
    const endVal = endInput.value;

    if (!startVal || !endVal) {
      daysInput.value = '';
      updateTotalDays();
      return;
    }

    const startDate = new Date(startVal);
    const endDate = new Date(endVal);
    const startPeriod = startPeriodInput.value;
    const endPeriod = endPeriodInput.value;

    if (endDate < startDate) {
      daysInput.value = '날짜 오류';
      updateTotalDays();
      return;
    }

    const msPerDay = 24 * 60 * 60 * 1000;

    if (startDate.getTime() === endDate.getTime()) {
      if (startPeriod === '오후' && endPeriod === '오전') {
        daysInput.value = '날짜 오류';
        updateTotalDays();
        return;
      }
      const totalDays = (startPeriod === endPeriod) ? 0.5 : 1;
      daysInput.value = `${totalDays}일`;
      updateTotalDays();
      return;
    }

    let totalDays = Math.round((endDate - startDate) / msPerDay) + 1;
    if (startPeriod === '오후') totalDays -= 0.5;
    if (endPeriod === '오전') totalDays -= 0.5;

    daysInput.value = `${totalDays}일`;
    updateTotalDays();
  }

  function updateTotalDays() {
    const rows = document.querySelectorAll('.leave-row');
    let sum = 0;
    let hasError = false;
    rows.forEach(tr => {
      const val = tr.querySelector('.row-days').value;
      if (val.includes('오류')) hasError = true;
      const num = parseFloat(val);
      if (!isNaN(num)) sum += num;
    });
    totalDaysEl.textContent = hasError ? '기간 확인 필요' : `${sum}일`;
  }

  function attachRowEvents(tr) {
    tr.querySelectorAll('.row-start, .row-end, .row-start-period, .row-end-period').forEach(el => {
      el.addEventListener('change', () => calcRowDays(tr));
    });
    tr.querySelector('.remove-row-btn').addEventListener('click', () => {
      if (document.querySelectorAll('.leave-row').length <= 1) return;
      tr.remove();
      updateTotalDays();
    });
  }

  function addLeaveRow() {
    const tr = createLeaveRow();
    leaveRowsBody.appendChild(tr);
    attachRowEvents(tr);
  }

  addRowBtn.addEventListener('click', addLeaveRow);

  addLeaveRow();

  const form = document.getElementById('vacation-form');
  const submitBtn = document.getElementById('submit-btn');
  const statusMsg = document.getElementById('status-msg');

  function showStatus(type, text) {
    statusMsg.textContent = text;
    statusMsg.className = `show ${type}`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    document.querySelectorAll('.leave-row').forEach(calcRowDays);
    const hasError = Array.from(document.querySelectorAll('.row-days')).some(el => el.value.includes('오류'));
    if (hasError) {
      showStatus('error', '휴가 기간을 다시 확인해주세요. (종료일이 시작일보다 빠르거나 같은 날 오후→오전으로 설정되어 있습니다)');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '제출 중...';
    statusMsg.className = '';

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        showStatus('success', '휴가계 신청서가 정상적으로 제출되었습니다.');
        form.reset();
        document.getElementById('applydate').valueAsDate = new Date();
        leaveRowsBody.innerHTML = '';
        addLeaveRow();
        updateTotalDays();
      } else {
        const data = await response.json().catch(() => null);
        const msg = data && data.errors ? data.errors.map(err => err.message).join(', ') : '제출 중 오류가 발생했습니다.';
        showStatus('error', msg);
      }
    } catch (err) {
      showStatus('error', '네트워크 오류로 제출하지 못했습니다. 다시 시도해주세요.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '신청서 제출';
    }
  });
</script>

</body>
</html>
