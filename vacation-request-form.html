<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacation Request Form</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #14202B;
    --text: #F1E9D8;
    --text-muted: #9FB0B8;
    --accent: #B0925A;
    --accent-hover: #C6A56C;
    --accent-text: #14202B;
    --card-bg: #1B2E3B;
    --field-bg: #14202B;
    --border: #2E4453;
    --toggle-bg: #1B2E3B;
    --toggle-border: #2E4453;
    --success: #6FBF73;
    --error: #D9534F;
  }

  html[data-theme="light"] {
    --bg: #F7F3EA;
    --text: #14202B;
    --text-muted: #5E6C74;
    --accent: #B0925A;
    --accent-hover: #9C7F49;
    --accent-text: #FFFFFF;
    --card-bg: #FFFFFF;
    --field-bg: #FBF9F4;
    --border: #DDD3C0;
    --toggle-bg: #FFFFFF;
    --toggle-border: #DDD3C0;
  }

  body {
    font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
    transition: background 0.2s ease, color 0.2s ease;
  }

  #theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--toggle-bg);
    border: 1px solid var(--toggle-border);
    color: var(--text);
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  p.desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 36px;
    text-align: center;
  }

  form {
    width: 100%;
    max-width: 720px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .row {
    display: flex;
    gap: 16px;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  label .req { color: var(--error); margin-left: 2px; }

  input, select, textarea {
    background: var(--field-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 0.95rem;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  .date-period-group {
    display: flex;
    gap: 4px;
    min-width: 0;
  }

  .date-period-group .row-start,
  .date-period-group .row-end { flex: 1 1 auto; min-width: 0; width: 100%; }

  .date-period-group .row-start-period,
  .date-period-group .row-end-period { flex: 0 0 auto; width: auto; min-width: 44px; }

  input[readonly] {
    color: var(--accent);
    font-weight: 600;
    cursor: default;
  }

  #leave-rows {
    width: 100%;
  }

  .leave-row {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .leave-row-fields {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 10px;
  }

  .leave-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .leave-field label {
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .leave-field.type { flex: 1 1 130px; min-width: 110px; }
  .leave-field.date { flex: 1 1 190px; min-width: 170px; }
  .leave-field.days { flex: 0 1 90px; min-width: 80px; }
  .leave-field.remove { flex: 0 0 auto; }

  .leave-field.remarks {
    width: 100%;
  }

  .leave-row input, .leave-row select {
    padding: 8px 10px;
    font-size: 0.85rem;
  }

  .row-days { min-width: 0; }

  textarea.row-remarks {
    width: 100%;
    resize: vertical;
    min-height: 52px;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 8px 10px;
  }

  .remove-row-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--error);
    width: 26px;
    height: 26px;
    padding: 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 1;
  }

  #add-row-btn {
    align-self: flex-start;
    background: none;
    border: 1px dashed var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
  }

  #add-row-btn:hover {
    background: rgba(176, 146, 90, 0.1);
  }

  .total-days-row {
    display: flex;
    justify-content: flex-end;
    align-items: baseline;
    gap: 10px;
    font-size: 0.9rem;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .total-days-row .value {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.05rem;
  }

  .section-title {
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  #submit-btn {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    padding: 15px 20px;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, opacity 0.15s ease;
    margin-top: 8px;
  }

  #submit-btn:hover { background: var(--accent-hover); }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  #status-msg {
    max-width: 560px;
    width: 100%;
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }

  #status-msg.show { display: block; }
  #status-msg.success { background: rgba(111, 191, 115, 0.12); border: 1px solid var(--success); color: var(--success); }
  #status-msg.error { background: rgba(217, 83, 79, 0.12); border: 1px solid var(--error); color: var(--error); }

  @media (max-width: 480px) {
    .row { flex-direction: column; }
    form { padding: 24px 20px; }
  }
</style>
</head>
<body>

<button id="theme-toggle" aria-label="Toggle theme" title="Switch dark/light mode">🌙</button>

<h1>Vacation Request Form</h1>
<p class="desc">Fill out the form below and submit — it will be sent automatically to the relevant department.</p>

<form id="vacation-form" action="https://formspree.io/f/mbdngzkz" method="POST">
  <div class="section-title">Applicant Information</div>

  <div class="row">
    <div class="field">
      <label for="name">Full Name<span class="req">*</span></label>
      <input type="text" id="name" name="full_name" required autocomplete="name">
    </div>
    <div class="field">
      <label for="dept">Department<span class="req">*</span></label>
      <input type="text" id="dept" name="department" required>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="position">Position/Title</label>
      <input type="text" id="position" name="position">
    </div>
    <div class="field">
      <label for="empno">Employee ID</label>
      <input type="text" id="empno" name="employee_id">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="email">Email (for reply)<span class="req">*</span></label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>
    <div class="field">
      <label for="phone">Emergency Contact</label>
      <input type="tel" id="phone" name="emergency_contact" placeholder="e.g. 010-0000-0000">
    </div>
  </div>

  <div class="section-title">Leave Details</div>
  <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: -12px;">You can apply for multiple types of leave in one submission. Add rows as needed.</p>

  <div id="leave-rows"></div>

  <button type="button" id="add-row-btn">+ Add Leave Item</button>

  <div class="total-days-row">
    <span>Total Days</span>
    <span class="value" id="total-days">0 days</span>
  </div>

  <div class="field">
    <label for="applydate">Application Date</label>
    <input type="date" id="applydate" name="application_date">
  </div>

  <input type="hidden" name="_subject" value="Vacation Request Form Submission">

  <button type="submit" id="submit-btn">Submit Request</button>
</form>

<div id="status-msg"></div>

<script>
  const themeToggleBtn = document.getElementById('theme-toggle');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggleBtn.textContent = theme === 'light' ? '☀️' : '🌙';
    localStorage.setItem('theme', theme);
  }

  const savedTheme = localStorage.getItem('theme')
    || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  applyTheme(savedTheme);

  themeToggleBtn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Default application date = today
  document.getElementById('applydate').valueAsDate = new Date();

  // Leave item cards (Leave Type / Start Date / End Date / Days / Remarks)
  const leaveRowsBody = document.getElementById('leave-rows');
  const addRowBtn = document.getElementById('add-row-btn');
  const totalDaysEl = document.getElementById('total-days');
  let rowCounter = 0;

  function formatDays(n) {
    return `${n} day${n === 1 ? '' : 's'}`;
  }

  function createLeaveRow() {
    rowCounter++;
    const idx = rowCounter;
    const row = document.createElement('div');
    row.className = 'leave-row';
    row.innerHTML = `
      <div class="leave-row-fields">
        <div class="leave-field type">
          <label>Leave Type</label>
          <select name="leave_type_${idx}" required>
            <option value="">Select</option>
            <option value="Annual">Annual</option>
            <option value="Sick">Sick</option>
            <option value="Bereavement">Bereavement</option>
            <option value="Official">Official</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="leave-field date">
          <label>Start Date</label>
          <div class="date-period-group">
            <input type="date" name="start_date_${idx}" class="row-start" required>
            <select name="start_period_${idx}" class="row-start-period">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>
        <div class="leave-field date">
          <label>End Date</label>
          <div class="date-period-group">
            <input type="date" name="end_date_${idx}" class="row-end" required>
            <select name="end_period_${idx}" class="row-end-period">
              <option value="AM">AM</option>
              <option value="PM" selected>PM</option>
            </select>
          </div>
        </div>
        <div class="leave-field days">
          <label>Days</label>
          <input type="text" name="leave_days_${idx}" class="row-days" readonly placeholder="Auto">
        </div>
        <div class="leave-field remove">
          <label>&nbsp;</label>
          <button type="button" class="remove-row-btn" title="Remove row">✕</button>
        </div>
      </div>
      <div class="leave-field remarks">
        <label>Remarks</label>
        <textarea name="remarks_${idx}" class="row-remarks" rows="2" placeholder="Remarks"></textarea>
      </div>
    `;
    return row;
  }

  function calcRowDays(row) {
    const startInput = row.querySelector('.row-start');
    const endInput = row.querySelector('.row-end');
    const startPeriodInput = row.querySelector('.row-start-period');
    const endPeriodInput = row.querySelector('.row-end-period');
    const daysInput = row.querySelector('.row-days');

    const startVal = startInput.value;
    const endVal = endInput.value;

    if (!startVal || !endVal) {
      daysInput.value = '';
      updateTotalDays();
      return;
    }

    const startDate = new Date(startVal);
    const endDate = new Date(endVal);
    const startPeriod = startPeriodInput.value;
    const endPeriod = endPeriodInput.value;

    if (endDate < startDate) {
      daysInput.value = 'Date Error';
      updateTotalDays();
      return;
    }

    const msPerDay = 24 * 60 * 60 * 1000;

    if (startDate.getTime() === endDate.getTime()) {
      if (startPeriod === 'PM' && endPeriod === 'AM') {
        daysInput.value = 'Date Error';
        updateTotalDays();
        return;
      }
      const totalDays = (startPeriod === endPeriod) ? 0.5 : 1;
      daysInput.value = formatDays(totalDays);
      updateTotalDays();
      return;
    }

    let totalDays = Math.round((endDate - startDate) / msPerDay) + 1;
    if (startPeriod === 'PM') totalDays -= 0.5;
    if (endPeriod === 'AM') totalDays -= 0.5;

    daysInput.value = formatDays(totalDays);
    updateTotalDays();
  }

  function updateTotalDays() {
    const rows = document.querySelectorAll('.leave-row');
    let sum = 0;
    let hasError = false;
    rows.forEach(row => {
      const val = row.querySelector('.row-days').value;
      if (val.includes('Error')) hasError = true;
      const num = parseFloat(val);
      if (!isNaN(num)) sum += num;
    });
    totalDaysEl.textContent = hasError ? 'Please check dates' : formatDays(sum);
  }

  function attachRowEvents(row) {
    row.querySelectorAll('.row-start, .row-end, .row-start-period, .row-end-period').forEach(el => {
      el.addEventListener('change', () => calcRowDays(row));
    });
    row.querySelector('.remove-row-btn').addEventListener('click', () => {
      if (document.querySelectorAll('.leave-row').length <= 1) return;
      row.remove();
      updateTotalDays();
    });
  }

  function addLeaveRow() {
    const row = createLeaveRow();
    leaveRowsBody.appendChild(row);
    attachRowEvents(row);
  }

  addRowBtn.addEventListener('click', addLeaveRow);

  addLeaveRow();

  const form = document.getElementById('vacation-form');
  const submitBtn = document.getElementById('submit-btn');
  const statusMsg = document.getElementById('status-msg');

  function showStatus(type, text) {
    statusMsg.textContent = text;
    statusMsg.className = `show ${type}`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    document.querySelectorAll('.leave-row').forEach(calcRowDays);
    const hasError = Array.from(document.querySelectorAll('.row-days')).some(el => el.value.includes('Error'));
    if (hasError) {
      showStatus('error', 'Please check the leave dates. (End date is before start date, or same-day PM→AM is set)');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    statusMsg.className = '';

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        showStatus('success', 'Your vacation request has been submitted successfully.');
        form.reset();
        document.getElementById('applydate').valueAsDate = new Date();
        leaveRowsBody.innerHTML = '';
        addLeaveRow();
        updateTotalDays();
      } else {
        const data = await response.json().catch(() => null);
        const msg = data && data.errors ? data.errors.map(err => err.message).join(', ') : 'An error occurred while submitting. Please try again.';
        showStatus('error', msg);
      }
    } catch (err) {
      showStatus('error', 'Network error — could not submit. Please try again.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Request';
    }
  });
</script>

</body>
</html>
